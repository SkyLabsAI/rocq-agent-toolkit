[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rocq-ltac-interp"
version = "0.1.0"
description = "A **heuristic** Ltac interpreter."
readme = "README.md"
authors = [
    { name = "Gregory Malecha", email = "gregory@skylabs-ai.com" },
]
requires-python = "==3.13.*"
dependencies = [
    "rocq-doc-manager",
]

[tool.uv.sources]
rocq-doc-manager = { workspace = true }


[project.urls]
Repository = "https://github.com/SkylabsAI/rocq-agent-toolkit"
Issues = "https://github.com/SkylabsAI/rocq-agent-toolkit/issues"
Changelog = "https://github.com/SkylabsAI/rocq-agent-toolkit/tree/main/changes"


[project.scripts]
tacinterp = "rocq_ltac_interp.tacinterp:main"

[dependency-groups]
dev = [
    "pytest>=8.4.2,<9",
    "pytest-asyncio>=1.3.0",
    "black>=23.7.0,<24",
    "isort>=5.12.0,<6",
    "flake8>=6.0.0,<7",
    "mypy>=1.18.2,<2",
    "ruff>=0.14.4",
    "taskipy>=1.14.1",
    "cram>=0.7",
    "hypothesis>=6.131.0",
    "hypothesis-jsonschema>=0.23.1",
]

[tool.uv]

[tool.hatch.build.targets.sdist]
include = ["src/rocq_ltac_interp"]

[tool.hatch.build.targets.wheel]
include = ["src/rocq_ltac_interp"]

[tool.hatch.build.targets.wheel.sources]
"src/rocq_ltac_interp" = "rocq_ltac_interp"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"rocq_ltac_interp" = ["py.typed"]

[tool.taskipy.tasks]
lint_ci = "ruff check"
format_ci = "ruff format --check"
reformat = "ruff format"
typecheck_ci = "mypy ."
test_ocaml_ci = "pytest"
# cram_ocaml_ci = "cram tests/*.t"
# TODO: setup tests that can run using `dune exec`, akin to what rocq-doc-manager does
precommit = "task lint_ci --fix; task reformat; task typecheck_ci"
