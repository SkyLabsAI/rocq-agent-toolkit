server:
  http_listen_port: 3200

distributor:
  # Default is 2048 bytes per attribute value in Tempo.
  # 0 disables truncation and keeps full `gen_ai.input.messages` payloads.
  max_attribute_bytes: 0
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 720h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
